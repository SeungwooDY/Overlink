<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 240px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111;
        color: #fff;
      }

      h1 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 2px;
      }

      .subtitle {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 16px;
      }

      .auth-section {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .auth-email {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.55);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
        min-width: 0;
      }

      .badge-pro {
        font-size: 10px;
        font-weight: 700;
        background: #22c55e;
        color: #fff;
        padding: 2px 7px;
        border-radius: 99px;
        flex-shrink: 0;
      }

      .label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.45);
        margin-bottom: 8px;
      }

      .options {
        display: flex;
        gap: 6px;
      }

      button {
        flex: 1;
        padding: 7px 4px;
        border-radius: 7px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.07);
        color: rgba(255, 255, 255, 0.6);
        font-size: 12px;
        cursor: pointer;
        transition: background 0.1s, color 0.1s;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.13);
        color: #fff;
      }

      button.active {
        background: #3b82f6;
        border-color: #3b82f6;
        color: #fff;
        font-weight: 600;
      }

      .auth-btn {
        flex: none;
        width: 100%;
        font-size: 12px;
        font-weight: 500;
      }

      .auth-btn.upgrade {
        background: rgba(59, 130, 246, 0.15);
        border-color: rgba(59, 130, 246, 0.4);
        color: #60a5fa;
      }

      .auth-btn.upgrade:hover {
        background: rgba(59, 130, 246, 0.25);
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <h1>Overlink</h1>
    <p class="subtitle">Detect URLs in screen shares</p>

    <div class="auth-section" id="auth-section"></div>

    <p class="label">OCR Refresh Rate</p>
    <div class="options" id="options"></div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
